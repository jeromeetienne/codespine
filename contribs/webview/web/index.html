<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>ts-knowledge-graph - WebView</title>
	<link rel="icon" type="image/svg+xml" href="./icon.svg">
	<script>
		/* Resolve the theme before the stylesheet paints so there is no flash of
		   the wrong colours. js/app.js owns the toggle and persistence after this. */
		(function () {
			try {
				var stored = localStorage.getItem('ktg.theme');
				var theme = stored === 'light' || stored === 'dark'
					? stored
					: (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
				document.documentElement.setAttribute('data-theme', theme);
			} catch (error) {
				document.documentElement.setAttribute('data-theme', 'dark');
			}
		})();
	</script>
	<link rel="stylesheet" href="./css/style.css">
</head>
<body>
	<aside id="sidebar">
		<div class="sidebar-head">
			<h1>Knowledge graph</h1>
			<button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch theme"></button>
		</div>
		<div id="status">no data loaded</div>

		<input id="search" type="search" placeholder="Search symbol or file… (Enter)" autocomplete="off">
		<div id="search-results"></div>

		<div class="row colour-by">
			<label for="encoding-select">Colour by</label>
			<select id="encoding-select">
				<option value="structural">kind</option>
				<option value="runtime">self-time (heat)</option>
				<option value="community">community</option>
			</select>
		</div>

		<section id="runtime" class="empty">
			<h2 class="foldable" data-fold="runtime" data-help="Self-time measured from a CPU profile, loaded with the enrich command: profile coverage, a heat scale, and a filter for only-measured nodes. Pick self-time (heat) under Colour by to shade the graph.">Runtime</h2>
			<div id="coverage">no runtime data</div>
			<label class="row"><input id="only-measured" type="checkbox"> only measured nodes</label>
			<div class="heat-legend">
				<span class="heat-min">cold</span>
				<span class="heat-bar"></span>
				<span class="heat-max">hot</span>
			</div>
			<div class="heat-note"><span class="heat-swatch unmeasured"></span> not measured</div>
			<h3 class="hotspots-title foldable" data-fold="hotspots" data-help="The functions with the most measured self-time, hottest first. Click one to centre and select it in the graph.">Hotspots</h3>
			<div id="hotspots"></div>
		</section>

		<section>
			<h2 class="foldable" data-fold="node-kinds" data-help="Every kind of declaration in the graph, such as Module, Class, Function and TypeAlias. Toggle a kind to show or hide its nodes; the number is how many there are.">Node kinds</h2>
			<div id="node-kinds" class="legend"></div>
		</section>

		<section>
			<h2 class="foldable" data-fold="edge-kinds" data-help="Every kind of relationship between nodes, such as CALLS, USES_TYPE and EXTENDS. Toggle a kind to show or hide its edges; the number is how many there are.">Edge kinds</h2>
			<div id="edge-kinds" class="legend"></div>
		</section>

		<section id="communities" class="empty">
			<h2 class="foldable" data-fold="communities" data-help="Clusters found by community detection, via the cluster command. Toggle a community to show or hide its nodes, or pick community under Colour by to shade the graph by cluster.">Communities</h2>
			<div id="community-legend" class="legend"></div>
		</section>

		<section>
			<h2 class="foldable" data-fold="options" data-help="Display options: hide isolated (unconnected) nodes, and choose or re-run the graph layout algorithm.">Options</h2>
			<label class="row"><input id="hide-isolated" type="checkbox"> hide isolated nodes</label>
			<div class="row">
				<select id="layout-select">
					<option value="fcose">fcose (force, label-aware)</option>
					<option value="cose">cose (force)</option>
					<option value="concentric">concentric (by degree)</option>
					<option value="breadthfirst">breadthfirst</option>
					<option value="circle">circle</option>
					<option value="grid">grid</option>
				</select>
				<button id="relayout">layout</button>
			</div>
		</section>

		<section id="details" class="empty">
			<h2 class="foldable" data-fold="selection" data-help="Details of the node you click in the graph: its kind, file, neighbours by edge kind, and any runtime metrics.">Selection</h2>
			<div class="selection-nav">
				<button id="nav-back" type="button" title="Previous selection" aria-label="Previous selection" disabled>←</button>
				<button id="nav-forward" type="button" title="Next selection" aria-label="Next selection" disabled>→</button>
			</div>
			<div id="details-body">click a node</div>
		</section>
	</aside>

	<main id="cy"></main>

	<div id="dropzone" class="hidden-overlay">
		<div>drop <code>nodes.jsonl</code> + <code>edges.jsonl</code> here</div>
	</div>

	<script src="./js_autogenerated/graph_data.js"></script>
	<script src="./js_autogenerated/kind_descriptions.js"></script>
	<script src="https://unpkg.com/cytoscape@3/dist/cytoscape.min.js"></script>
	<script src="https://unpkg.com/layout-base/layout-base.js"></script>
	<script src="https://unpkg.com/cose-base/cose-base.js"></script>
	<script src="https://unpkg.com/cytoscape-fcose/cytoscape-fcose.js"></script>
	<script src="./js/app.js"></script>
</body>
</html>
