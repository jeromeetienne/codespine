name: Deploy docsite to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'contribs/docsite/**'
      - 'contribs/webview/**'
      - 'src/**'
      - 'sample_projects/project_04/**'
      - 'scripts/profile_and_enrich.sh'
      - '.github/workflows/deploy-docsite.yml'
  workflow_dispatch:

# Allow the deploy job to publish to Pages and mint the OIDC token it needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; let an in-flight run finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contribs/docsite
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 (not 20): clustering the demo graph loads networkanalysis-ts —
          # a CommonJS package that ships ESM re-export syntax. Node 20's
          # cjs-module-lexer fails to detect its named exports; Node 24 resolves
          # them, matching the local dev environment.
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            contribs/docsite/package-lock.json

      # Build the WebView demo bundle from sample_projects/project_04: extract its
      # source, then cluster (community detection) and runtime-enrich (a profiled
      # workload) the graph, and export the result so the static page ships with
      # data — community + self-time included — and GitHub deep-links
      # (window.GRAPH_SOURCE) pinned to the analysed commit.
      - name: Install root dependencies
        working-directory: ${{ github.workspace }}
        env:
          # the pipeline runs through tsx and never launches a browser; skip the
          # heavy Chromium download puppeteer's install would otherwise trigger.
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci

      - name: Build the demo graph (sample_projects/project_04 — clustered + runtime-enriched)
        working-directory: ${{ github.workspace }}
        run: |
          npm run project04:rebuild
          npm run project04:cluster
          npm run project04:enrich

      - name: Export the enriched graph into the WebView bundle
        working-directory: ${{ github.workspace }}
        run: npx tsx src/cli.ts webview --export contribs/webview/web/js_autogenerated/graph_data.js -o .ts_knowledge_graph/project_04 --source sample_projects/project_04

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        # The runner sets GITHUB_ACTIONS=true, which is what applies the
        # `/ts_knowledge_graph` basePath in next.config.mjs. Do not set NODE_ENV at
        # the job level — that would make `npm ci` skip devDependencies (typescript).
        run: npm run build

      - name: Add the WebView demo to the export
        # The static export is uploaded as-is; dropping web/ at out/webview serves
        # the demo at <site>/webview/ alongside the docs.
        working-directory: ${{ github.workspace }}
        run: cp -r contribs/webview/web contribs/docsite/out/webview

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Only the static export — no repo files, no .claude symlinks.
          path: contribs/docsite/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
